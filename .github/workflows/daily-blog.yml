name: Daily SEO Blog - MoreBuildtech

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: echo "No packages needed"

      - name: Generate blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_blog.py

      - name: Push to GitHub
        run: |
          git config --global user.name "MoreBuildtech Bot"
          git config --global user.email "bot@morebuildtech.in"
          git add .
          git diff --staged --quiet || git commit -m "Blog: $(date +'%d %b %Y')"
          git push
